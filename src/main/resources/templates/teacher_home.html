<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>教員ダッシュボード</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-indigo-600">EduExam Teacher</h1>
                </div>
                <div class="flex items-center">
                    <span class="text-gray-700 mr-4">ようこそ, <span th:text="${user.username}" class="font-semibold">先生</span>さん</span>
                    <a href="/logout" class="text-sm text-gray-500 hover:text-gray-900">ログアウト</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-gray-900">作成した試験一覧</h2>
            <a href="/exam/create/new" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition">
                ＋ 新しい試験を作成
            </a>
        </div>

        <div class="bg-white p-4 rounded-lg shadow-sm mb-6 flex flex-wrap gap-4 items-center">
            <form action="/teacher_home" method="get" class="flex flex-wrap gap-4 items-center w-full">
                <div class="flex items-center">
                    <label class="text-sm text-gray-600 mr-2">科目:</label>
                    <select name="filterSubjectId" class="border-gray-300 rounded-md shadow-sm text-sm p-2 border" onchange="this.form.submit()">
                        <option value="">すべて</option>
                        <option th:each="subject : ${allSubjects}" 
                                th:value="${subject.id}" 
                                th:text="${subject.name}"
                                th:selected="${subject.id == currentFilter}">
                        </option>
                    </select>
                </div>
                <div class="flex items-center ml-auto">
                    <label class="text-sm text-gray-600 mr-2">並び替え:</label>
                    <select name="sortBy" class="border-gray-300 rounded-md shadow-sm text-sm p-2 border mr-2" onchange="this.form.submit()">
                        <option value="title" th:selected="${currentSortBy == 'title'}">タイトル順</option>
                        <option value="createdAt" th:selected="${currentSortBy == 'createdAt'}">作成日順</option>
                        <option value="updatedAt" th:selected="${currentSortBy == 'updatedAt'}">更新日順</option>
                    </select>
                    <select name="sortDir" class="border-gray-300 rounded-md shadow-sm text-sm p-2 border" onchange="this.form.submit()">
                        <option value="asc" th:selected="${currentSortDir == 'asc'}">昇順</option>
                        <option value="desc" th:selected="${currentSortDir == 'desc'}">降順</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div th:each="exam : ${exams}" class="bg-white overflow-hidden shadow rounded-lg hover:shadow-md transition-shadow duration-300 border border-gray-100">
                <div class="px-4 py-5 sm:p-6">
                    <div class="flex justify-between items-start">
                        <h3 class="text-lg font-medium text-gray-900 truncate" th:text="${exam.title}">試験タイトル</h3>
                        <span th:if="${exam.subjectId != null}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                            ID: <span th:text="${exam.subjectId}"></span>
                        </span>
                    </div>
                    <p class="mt-1 text-sm text-gray-500 line-clamp-2" th:text="${exam.description}">説明文</p>
                    <div class="mt-4 flex items-center text-xs text-gray-400">
                        <span class="mr-2">作成: <span th:text="${#temporals.format(exam.createdAt, 'yyyy/MM/dd')}"></span></span>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-4 sm:px-6 flex justify-end items-center space-x-2">
                    
                    <button type="button" 
                            th:onclick="|copyExamUrl('${exam.id}')|"
                            class="text-gray-500 hover:text-indigo-600 text-sm font-medium flex items-center px-2 py-1 border border-gray-300 rounded bg-white hover:bg-gray-50"
                            title="受験用URLをコピー">
                        🔗 <span class="ml-1 text-xs">URL</span>
                    </button>

                    <a th:href="@{/exam/results/{id}(id=${exam.id})}" class="text-green-600 hover:text-green-900 text-sm font-medium flex items-center">
                        <span class="mr-1">📊</span> 成績
                    </a>
                    
                    <a th:href="@{/exam/create/questions/{id}(id=${exam.id})}" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">編集</a>
                    
                    <form th:action="@{/exam/delete/{id}(id=${exam.id})}" method="post" style="display:inline;" onsubmit="return confirm('本当に削除しますか？');">
                        <button type="submit" class="text-red-600 hover:text-red-900 text-sm font-medium ml-1">削除</button>
                    </form>
                </div>
            </div>
            
            <div th:if="${exams.isEmpty()}" class="col-span-full text-center py-10 text-gray-500 bg-white rounded-lg border border-dashed border-gray-300">
                試験がまだありません。「新しい試験を作成」ボタンから作成してください。
            </div>
        </div>
    </div>

    <script>
        function copyExamUrl(examId) {
            // 現在のホスト名 (例: localhost:8080) を取得してURLを作成
            const url = window.location.origin + '/student/exam/' + examId;
            
            navigator.clipboard.writeText(url).then(function() {
                alert('受験用URLをコピーしました！\n生徒にこのURLを共有してください。\n\n' + url);
            }, function(err) {
                console.error('コピーに失敗しました: ', err);
                prompt('以下のURLをコピーしてください:', url);
            });
        }
    </script>
</body>
</html>
