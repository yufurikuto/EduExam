<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>成績一覧</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto bg-white p-8 rounded-xl shadow-lg">
        
        <div class="flex justify-between items-center mb-6 border-b pb-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-800" th:text="${exam.title}">試験タイトル</h1>
                <p class="text-gray-500 mt-1">成績管理・分析</p>
            </div>
            <div class="bg-indigo-50 px-6 py-3 rounded-lg text-center">
                <p class="text-xs font-bold text-gray-500 uppercase">平均点</p>
                <p class="text-3xl font-bold text-indigo-600" th:text="${averageScore}">0.0</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">学生ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提出日時</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">スコア</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状態</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="res : ${results}" class="hover:bg-gray-50">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                            <span th:text="${res.studentId}">1</span>
                            </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" 
                            th:text="${#temporals.format(res.submittedAt, 'yyyy/MM/dd HH:mm')}">
                            2025/12/16 10:00
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-3 py-1 inline-flex text-sm leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                <span th:text="${res.score}">80</span> / <span th:text="${res.totalScore}">100</span>
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            完了
                        </td>
                    </tr>
                    <tr th:if="${results.isEmpty()}">
                        <td colspan="4" class="px-6 py-10 text-center text-gray-400">
                            まだ受験データがありません。
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 pt-4 border-t">
            <a href="/teacher_home" class="text-indigo-600 hover:text-indigo-800 font-medium">
                &lt; ダッシュボードに戻る
            </a>
        </div>
    </div>
</body>
</html>
