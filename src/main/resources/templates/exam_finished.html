<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>採点結果</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-xl shadow-2xl text-center max-w-lg w-full">
        <div class="text-6xl mb-6">🏆</div>
        
        <h1 class="text-3xl font-bold text-gray-800 mb-2">お疲れ様でした！</h1>
        <p class="text-gray-500 mb-8" th:text="${examTitle} + ' の回答を受け付けました'">試験の回答を受け付けました</p>
        
        <div class="bg-indigo-50 rounded-lg p-6 mb-8">
            <p class="text-gray-600 text-sm font-bold uppercase tracking-wide">あなたのスコア</p>
            <div class="flex justify-center items-end mt-2 text-indigo-900">
                <span class="text-6xl font-extrabold" th:text="${result.score}">80</span>
                <span class="text-2xl font-medium mb-2 ml-1 text-gray-400">/ <span th:text="${result.totalScore}">100</span></span>
            </div>
        </div>

        <a href="/teacher_home" class="inline-block bg-indigo-600 text-white font-bold py-3 px-8 rounded-full hover:bg-indigo-700 transition duration-200">
            ホームに戻る
        </a>
    </div>
</body>
</html>
