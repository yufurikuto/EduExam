<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">EduExam ログイン</h1>

        <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            <p>ID・メールアドレス、またはパスワードが間違っています。</p>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-4">
            
            <div>
                <label for="identifier" class="block text-sm font-medium text-gray-700">ユーザーID / メールアドレス</label>
                <input type="text" id="identifier" name="identifier" required autofocus
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="ユーザーID または メールアドレス">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">パスワード</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition duration-200">
                ログイン
            </button>
        </form>

        <div class="mt-4 text-center">
			<a href="/register" class="text-sm text-indigo-600 hover:text-indigo-800">アカウント登録はこちら</a>
        </div>
    </div>

</body>
</html>
