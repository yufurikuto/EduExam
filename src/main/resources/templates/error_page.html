<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>エラーが発生しました</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }</style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg border-l-4 border-red-500">
        <h1 class="text-3xl font-bold mb-4 text-red-600">🚨 処理中にエラーが発生しました</h1>
        
        <p th:if="${error}" class="text-gray-700 mb-6">
            <span class="font-semibold">詳細:</span> <span th:text="${error}">予期せぬエラーが発生しました。</span>
        </p>

        <p th:unless="${error}" class="text-gray-700 mb-6">
            予期せぬエラーが発生しました。管理者にお問い合わせいただくか、ダッシュボードに戻ってください。
        </p>

        <a th:href="@{/teacher_home}" class="inline-block bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2 px-4 rounded-md transition duration-150">
            ダッシュボードに戻る
        </a>
    </div>
</body>
</html>
