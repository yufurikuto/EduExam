<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規アカウント登録</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">アカウント作成</h1>

        <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/register}" method="post" class="space-y-4">
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">ユーザーID</label>
                <input type="text" id="username" name="username" th:value="${username}" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="ユーザー名">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">メールアドレス</label>
                <input type="email" id="email" name="email" th:value="${email}" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
                       placeholder="example@mail.com">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">パスワード</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">利用目的</label>
                <div class="flex space-x-4">
                    <label class="inline-flex items-center">
                        <input type="radio" name="role" value="STUDENT" checked class="form-radio text-indigo-600">
                        <span class="ml-2">学生として利用</span>
                    </label>
                    <label class="inline-flex items-center">
                        <input type="radio" name="role" value="TEACHER" class="form-radio text-indigo-600">
                        <span class="ml-2">先生として利用</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition duration-200">
                登録する
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="/login" class="text-sm text-indigo-600 hover:text-indigo-800">すでにアカウントをお持ちの方はこちら</a>
        </div>
    </div>

</body>
</html>
